name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *' # Nightly at 00:00 UTC
  workflow_dispatch: # Manual trigger

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Frontend dependencies
      run: npm install
      working-directory: testflow-frontend

    - name: Build Frontend
      run: npm run build
      working-directory: testflow-frontend
      env:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

    - name: Install QA dependencies
      run: npm install
      working-directory: testflow-qa

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: testflow-qa

    - name: Start Frontend and Run Tests
      run: |
        npm run start & 
        npx wait-on http://localhost:3000
        npx playwright test
      working-directory: testflow-qa
      env:
        # QA envs
        FIREBASE_USER: ${{ secrets.FIREBASE_USER }}
        FIREBASE_PASS: ${{ secrets.FIREBASE_PASS }}
        # Shared envs for DB if needed
        BASE_URL: http://localhost:3000

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: testflow-qa/playwright-report/
        retention-days: 30
